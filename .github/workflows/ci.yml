name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  # ── Unit tests — every push and PR ────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm test

  # ── Prebuilds — master push only ─────────────────────────────────────────
  prebuild-x64:
    name: Prebuild (linux-x64)
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: ci-prebuilds-linux-x64
          path: prebuilds/
          if-no-files-found: error

  prebuild-arm64:
    name: Prebuild (linux-arm64)
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run prebuild

      - uses: actions/upload-artifact@v4
        with:
          name: ci-prebuilds-linux-arm64
          path: prebuilds/
          if-no-files-found: error

  # ── E2E tests — master push only, both platforms ──────────────────────────
  e2e-x64:
    name: E2E Tests (linux/amd64)
    runs-on: ubuntu-latest
    needs: prebuild-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          name: ci-prebuilds-linux-x64
          path: prebuilds/

      - name: Run E2E tests (linux/amd64)
        run: |
          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD:/workspace" \
            -w /workspace \
            node:24 \
            npm run test:e2e

  e2e-arm64:
    name: E2E Tests (QEMU linux/arm64)
    runs-on: ubuntu-latest
    needs: prebuild-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - uses: actions/download-artifact@v4
        with:
          name: ci-prebuilds-linux-arm64
          path: prebuilds/

      - name: Enable QEMU arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run E2E tests (linux/arm64 via QEMU)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "$PWD:/workspace" \
            -w /workspace \
            node:24 \
            npm run test:e2e
